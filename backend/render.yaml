services:
  - type: web
    name: nextowner-api
    env: node
    region: singapore          # closest to India/Nepal
    plan: free
    rootDir: .                 # backend folder
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # ── Set these manually in Render dashboard → Environment ──
      - key: MONGODB_URI
        sync: false            # paste your Atlas URI
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false            # paste your Brevo API key (app.brevo.com → SMTP & API → API Keys)
      - key: SUPPORT_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CLIENT_URL
        sync: false            # your Vercel frontend URL
