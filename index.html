<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Favicon chain — NextOwner logo ──────────────────────── -->
    <!-- Primary: PNG for maximum browser compatibility -->
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16"  href="/icons/icon-16.png" />
    <link rel="shortcut icon"         type="image/png" href="/favicon.png" />
    <!-- Apple touch icon (iOS home screen, Safari bookmarks) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <!-- Extra sizes for pinned tabs, Windows tiles -->
    <link rel="icon" type="image/png" sizes="48x48"  href="/icons/icon-48.png" />
    <link rel="icon" type="image/png" sizes="96x96"  href="/icons/icon-96.png" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Theme ─────────────────────────────────────────────── -->
    <meta name="theme-color" content="#0c0c10" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0c0c10" />

    <!-- ── PWA / iOS ─────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NextOwner" />

    <!-- ── Primary SEO ───────────────────────────────────────── -->
    <title>NextOwner — Buy · Sell · Swap on Campus</title>
    <meta name="description"
      content="NextOwner is India's #1 student marketplace. Buy, sell, and swap campus essentials — laptops, books, furniture, cycles and more — with verified students near you." />
    <meta name="keywords"
      content="student marketplace, buy sell campus, college marketplace, India, Nepal, used laptop, second hand books, hostel essentials, NextOwner" />
    <meta name="author" content="NextOwner" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn, Discord) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="NextOwner" />
    <meta property="og:title"       content="NextOwner — India's Campus Marketplace" />
    <meta property="og:description"
      content="Buy, sell, and swap campus essentials with verified students near you. Laptops, books, furniture, cycles and more." />
    <meta property="og:image"       content="/og.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="NextOwner — Campus Marketplace" />
    <meta property="og:url"         content="https://nextowner.in" />
    <meta property="og:locale"      content="en_IN" />

    <!-- ── Twitter / X Card ──────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@nextowner" />
    <meta name="twitter:title"       content="NextOwner — India's Campus Marketplace" />
    <meta name="twitter:description"
      content="Buy, sell, and swap campus essentials with verified students near you." />
    <meta name="twitter:image"       content="/og.png" />
    <meta name="twitter:image:alt"   content="NextOwner — Campus Marketplace" />

    <!-- ── Preconnect for fonts ───────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
